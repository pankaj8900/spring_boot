server:
  port: 8082

spring:
  application:
    name: aml-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: aml-service

aml:
  threshold: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
